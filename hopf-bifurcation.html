<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercritical Hopf Bifurcation · Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Supercritical Hopf Bifurcation</h1>
            <p class="subtitle">
                dx/dt = λx − y − x(x² + y²) | dy/dt = x + λy − y(x² + y²)
            </p>
        </header>

        <main class="main-content">
            <div class="canvas-wrapper">
                <canvas id="phaseCanvas" width="600" height="600" aria-label="Phase portrait of the Hopf bifurcation"></canvas>
            </div>

            <aside class="info-panel" id="infoPanel">
                <!-- Eigenvalue card -->
                <div class="info-card">
                    <h3>📐 Eigenvalues</h3>
                    <div class="info-row">
                        <span class="info-label">Characteristic</span>
                        <span class="info-value" id="eigenvalueDisplay">λ ± i</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Real part</span>
                        <span class="info-value" id="realPartDisplay">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Imaginary part</span>
                        <span class="info-value">±1</span>
                    </div>
                </div>

                <!-- Stability card -->
                <div class="info-card">
                    <h3>🔍 Stability Classification</h3>
                    <div class="badge-container">
                        <span class="stability-badge" id="stabilityBadge">—</span>
                    </div>
                    <div class="info-row limit-cycle-info" id="limitCycleRow" style="display:none;">
                        <span class="info-label">Limit cycle radius</span>
                        <span class="info-value" id="limitCycleRadius">—</span>
                    </div>
                    <p class="description" id="stabilityDescription">—</p>
                </div>

                <!-- Legend card -->
                <div class="info-card">
                    <h3>📋 Legend</h3>
                    <div class="legend">
                        <div class="legend-item">
                            <span class="legend-dot equilibrium"></span> Equilibrium (0,0)
                        </div>
                        <div class="legend-item">
                            <span class="legend-dash limit-cycle"></span> Limit cycle
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot direction-field"></span> Direction field
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <div class="controls">
            <div class="control-group">
                <label for="lambdaSlider">λ =</label>
                <span class="lambda-display" id="lambdaDisplay">0.00</span>
            </div>
            <input type="range" id="lambdaSlider" min="-2" max="2" step="0.01" value="0" aria-label="Lambda parameter">
            <span class="range-limit">-2</span>
            <span class="range-limit">2</span>
            <button id="playPauseBtn" class="active-btn" title="Play / Pause animation">⏸ Pause</button>
            <button id="resetBtn" title="Reset all trajectories to start">↺ Reset</button>
            <button id="clearBtn" title="Clear trail histories">🗑 Clear Trails</button>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
